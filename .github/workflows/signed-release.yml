name: Signed Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to build and publish, for example v0.9.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-2022
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: .\build_exe.ps1

      - name: Resolve release asset
        id: asset
        shell: pwsh
        run: |
          $asset = Get-ChildItem -LiteralPath release -Filter "XML_Editor_Desktop_*.exe" | Select-Object -First 1
          if (-not $asset) {
            throw "Release executable was not created."
          }
          "path=$($asset.FullName)" >> $env:GITHUB_OUTPUT
          "name=$($asset.Name)" >> $env:GITHUB_OUTPUT

      - name: Sign executable with Microsoft Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ steps.asset.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Authenticode signature
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -LiteralPath "${{ steps.asset.outputs.path }}"
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature, got $($signature.Status)."
          }

      - name: Generate SHA256 hash
        id: hash
        shell: pwsh
        run: |
          $hash = Get-FileHash -LiteralPath "${{ steps.asset.outputs.path }}" -Algorithm SHA256
          "sha256=$($hash.Hash)" >> $env:GITHUB_OUTPUT
          "SHA256: $($hash.Hash)" | Out-File -FilePath release\SHA256SUMS.txt -Encoding utf8

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $title = "XML Editor Desktop $tag"
          $notes = @"
          Signed Windows release for XML Editor Desktop.

          Asset:
          - ${{ steps.asset.outputs.name }}

          Authenticode:
          - Signed with Microsoft Trusted Signing.
          - Timestamped with Microsoft Trusted Signing timestamp service.

          SHA256:
          ${{ steps.hash.outputs.sha256 }}
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $title --notes $notes
          } else {
            gh release edit $tag --title $title --notes $notes
          }

          gh release upload $tag "${{ steps.asset.outputs.path }}" release\SHA256SUMS.txt --clobber
