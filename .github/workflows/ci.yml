name: CI

on:
  push:
    branches:
      - main
      - chore/**
      - feature/**
      - fix/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python desktop host
        run: python -m py_compile XML_Editor.py

      - name: Verify required app files exist
        run: |
          test -f app.js
          test -f index.html
          test -f style.css
          test -f requirements.txt
          test -f docs/RELEASE_SECURITY.md
          test -f scripts/sign-release.ps1
          test -f scripts/verify-release.ps1
          test -f .github/workflows/signed-release.yml

      - name: Verify desktop entrypoint references assets
        run: |
          grep -q 'style.css' index.html
          grep -q 'app.js' index.html
          grep -q 'XML Editor Desktop' index.html

      - name: Verify desktop release target
        run: |
          grep -q 'oywino/xml-editor-desktop' XML_Editor.py
          grep -q 'XML_Editor_Desktop' build_exe.ps1
